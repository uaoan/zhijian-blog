backend:
  name: github
  repo: uaoan/uaoan
  branch: main
  base_url: https://YOUR-OAUTH-PROXY.workers.dev
  auth_endpoint: /auth
  use_graphql: true

local_backend: true
publish_mode: editorial_workflow

site_url: https://uaoan.github.io/uaoan
display_url: https://uaoan.github.io/uaoan
logo:
  src: https://uaoan.github.io/uaoan/assets/images/cms-logo.svg
  show_in_header: true

media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

collections:
  - name: "posts"
    label: "博客文章"
    label_singular: "文章"
    folder: "_posts"
    create: true
    delete: true
    extension: "md"
    format: "frontmatter"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} · {{date}}"
    sortable_fields: ["date", "title"]
    view_filters:
      - label: "精选文章"
        field: featured
        pattern: true
      - label: "草稿"
        field: published
        pattern: false
    fields:
      - { label: "标题", name: "title", widget: "string", hint: "建议不超过 30 个汉字" }
      - { label: "发布日期", name: "date", widget: "datetime", format: "YYYY-MM-DD HH:mm:ss Z", date_format: "YYYY-MM-DD", time_format: "HH:mm" }
      - { label: "作者", name: "author", widget: "string", default: "uaoan" }
      - { label: "摘要", name: "description", widget: "text", hint: "用于首页卡片和搜索结果，建议 60—100 字" }
      - { label: "封面图", name: "cover", widget: "image", required: false, choose_url: false, media_library: { config: { multiple: false } } }
      - { label: "分类", name: "categories", widget: "list", default: ["随笔"], allow_add: true }
      - { label: "标签", name: "tags", widget: "list", required: false, allow_add: true }
      - { label: "设为精选", name: "featured", widget: "boolean", default: false }
      - { label: "立即发布", name: "published", widget: "boolean", default: true, hint: "关闭后文章不会出现在公开网站" }
      - { label: "正文", name: "body", widget: "markdown", minimal: false }
